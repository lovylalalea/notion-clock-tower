<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clock Tower</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 420px;
    height: auto;
    overflow: hidden;
    background: transparent;
  }

  .widget-wrapper {
    width: 420px;
    height: auto;
    margin: 0 auto;
    overflow: hidden;
    background: transparent;
  }

  .tower-container {
    position: relative;
    width: 420px;
    height: auto;
    background: transparent;
  }

  .tower-container img {
    width: 420px;
    height: auto;
    display: block;
  }

  .analog-clock {
    position: absolute;
    width: 25px;
    height: 25px;
    border: 2px solid rgba(255,255,255,0.85);
    border-radius: 50%;
    top: 178px;
    left: 50%;
    transform: translateX(-58%);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
  }

  .hand {
    position: absolute;
    width: 50%;
    height: 1.5px;
    background: white;
    top: 50%;
    left: 50%;
    transform-origin: 0% 50%; /* your original */
    border-radius: 2px;
  }

  #hour-hand { height: 2px; width: 35%; }
  #minute-hand { height: 1.5px; width: 50%; }
  #second-hand { height: 1px; width: 55%; background: #ffcccc; }

  #digital-clock {
    position: absolute;
    top: 252px;
    left: 50%;
    transform: translateX(-54%);
    font-family: "Times New Roman", serif;
    font-size: 12px;
    color: #ff8fb3;
    text-shadow: 0 0 8px rgba(255, 143, 179, 0.9);
  }
</style>
</head>

<body>

<div class="widget-wrapper">
  <div class="tower-container">
    <img src="https://i.imgur.com/o2z6I7K.jpeg" alt="Clock Tower">

    <div class="analog-clock">
      <div id="hour-hand" class="hand"></div>
      <div id="minute-hand" class="hand"></div>
      <div id="second-hand" class="hand"></div>
    </div>

    <div id="digital-clock"></div>
  </div>
</div>

<script>
  function updateDigitalClock() {
    const now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes();
    let ampm = hours >= 12 ? "PM" : "AM";

    hours = hours % 12;
    hours = hours ? hours : 12;
    minutes = minutes < 10 ? "0" + minutes : minutes;

    document.getElementById("digital-clock").innerHTML =
      hours + ":" + minutes + " " + ampm;
  }

  function updateAnalogClock() {
    const now = new Date();
    const seconds = now.getSeconds();
    const minutes = now.getMinutes();
    const hours = now.getHours();

    /* CLOCK FACE ROTATION FIX: subtract 110 degrees */
    const OFFSET = -110;

    const secondDeg = seconds * 6 + OFFSET;
    const minuteDeg = minutes * 6 + seconds * 0.1 + OFFSET;
    const hourDeg = (hours % 12) * 30 + minutes * 0.5 + OFFSET;

    document.getElementById("second-hand").style.transform =
      `rotate(${secondDeg}deg)`;
    document.getElementById("minute-hand").style.transform =
      `rotate(${minuteDeg}deg)`;
    document.getElementById("hour-hand").style.transform =
      `rotate(${hourDeg}deg)`;
  }

  setInterval(() => {
    updateDigitalClock();
    updateAnalogClock();
  }, 1000);

  updateDigitalClock();
  updateAnalogClock();
</script>

</body>
</html>
